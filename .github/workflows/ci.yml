# llm-wiki CI/CD Pipeline
# Tests, clippy, doc tests, and publish to crates.io on tags

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Test on stable Rust
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets
      - name: Build
        run: cargo build --all-targets
      - name: Run tests
        run: cargo test --all-targets
      - name: Run doc tests
        run: cargo test --doc

  # Build and test on multiple Rust versions
  test-versions:
    name: Test on ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [1.75, stable, beta, nightly]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default ${{ matrix.rust }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets

  # Build on all target platforms (binary examples only)
  cross-build:
    name: Cross-build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - platform: macOS x86_64
            runner: macos-13
            target: x86_64-apple-darwin
          - platform: macOS ARM64
            runner: macos-14
            target: aarch64-apple-darwin
          - platform: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build example CLI
        run: cargo build --release --example cli --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-wiki-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/examples/cli
          retention-days: 1

  # Publish to crates.io on tag
  publish:
    name: Publish to crates.io
    needs: [test, test-versions, cross-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup default stable
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --token $CARGO_REGISTRY_TOKEN

  # Upload example binaries to release
  release:
    name: Upload to Release
    needs: [cross-build]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Prepare binaries
        run: |
          mkdir -p dist
          cp artifacts/llm-wiki-Linux\ x86_64/llm-wiki-Linux\ x86_64 dist/llm-wiki-linux-x86_64
          cp artifacts/llm-wiki-macOS\ x86_64/llm-wiki-macOS\ x86_64 dist/llm-wiki-macos-x86_64
          cp artifacts/llm-wiki-macOS\ ARM64/llm-wiki-macOS\ ARM64 dist/llm-wiki-macos-arm64
          cp artifacts/llm-wiki-Windows\ x86_64/llm-wiki-Windows\ x86_64.exe dist/llm-wiki-windows-x86_64.exe
          chmod +x dist/llm-wiki-linux-x86_64 dist/llm-wiki-macos-x86_64 dist/llm-wiki-macos-arm64

      - name: SHA256 checksums
        run: |
          cd dist
          sha256sum llm-wiki-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload to release
        env:
          TAG: ${{ github.ref }}
        run: |
          TAG_NAME="${TAG##refs/tags/}"
          echo "Uploading to release: $TAG_NAME"
          gh release upload "$TAG_NAME" dist/llm-wiki-linux-x86_64 --clobber
          gh release upload "$TAG_NAME" dist/llm-wiki-macos-x86_64 --clobber
          gh release upload "$TAG_NAME" dist/llm-wiki-macos-arm64 --clobber
          gh release upload "$TAG_NAME" dist/llm-wiki-windows-x86_64.exe --clobber
          gh release upload "$TAG_NAME" dist/SHA256SUMS.txt --clobber
